name: Workflow 4 - Brands Batch 4 (Sub 16-18)

on:
  workflow_run:
    workflows: ["Workflow 3 - Brands Batch 3 (Sub 11-15)"]
    types:
      - completed
  workflow_dispatch:  # Allows manual trigger

jobs:
  scrape-brands-batch-4:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folder: 
          - women_brands_sub16
          - women_brands_sub17
          - women_brands_sub18
      fail-fast: false  # Continue even if one folder fails
      max-parallel: 3    # Run all 3 in parallel
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps
      
      - name: Run scraper for ${{ matrix.folder }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          python -m ${{ matrix.folder }}.main
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.folder }}
          path: |
            **/*.log
            **/temp/**
          retention-days: 7
